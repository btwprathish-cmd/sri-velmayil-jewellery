openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Sri Velmayil Jewellery
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: rates
    description: Gold and silver rate operations
  - name: auth
    description: Authentication operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /rates/latest:
    get:
      operationId: getLatestRates
      tags: [rates]
      summary: Get latest gold and silver rates
      description: Returns the latest live gold and silver rates for Tirupur
      responses:
        "200":
          description: Latest rates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateRecord"
  /rates/history:
    get:
      operationId: getRateHistory
      tags: [rates]
      summary: Get historical gold rates
      description: Returns last 90 days of gold rate history
      responses:
        "200":
          description: Rate history array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RateRecord"
  /rates/date/{date}:
    get:
      operationId: getRateByDate
      tags: [rates]
      summary: Get gold rate for specific date
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rate record for the date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateRecord"
        "404":
          description: Rate not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/logout:
    post:
      operationId: adminLogout
      tags: [auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
  /auth/session:
    get:
      operationId: getSession
      tags: [auth]
      summary: Get current session
      responses:
        "200":
          description: Session info or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionInfo"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RateRecord:
      type: object
      properties:
        date:
          type: string
        gold22k_1g:
          type: number
        gold22k_8g:
          type: number
        silver_1g:
          type: number
        gold24k_1g:
          type: number
        source:
          type: string
        fetchedAt:
          type: string
        trend_gold:
          type: ["number", "null"]
        trend_silver:
          type: ["number", "null"]
      required:
        - date
        - gold22k_1g
        - gold22k_8g
        - silver_1g
        - gold24k_1g
        - source
        - fetchedAt
    LoginInput:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password
    LoginResult:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
    SessionInfo:
      type: object
      properties:
        authenticated:
          type: boolean
        username:
          type: ["string", "null"]
      required:
        - authenticated
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
