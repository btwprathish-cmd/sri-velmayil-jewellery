kind = "mobile"
previewPath = "/mobile/"
title = "Sri Velmayil Jewellery Mobile"
version = "1.0.0"
id = "artifacts/sabarish-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 20597

[services.development]
run = "pnpm --filter @workspace/sabarish-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sabarish-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/sabarish-mobile", "run", "serve" ]

[services.env]
PORT = "20597"
BASE_PATH = "/mobile/"
